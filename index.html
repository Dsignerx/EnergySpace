<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EnergySpace</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="hud">
      <div class="panel" id="commandPanel">
        <div id="pauseIndicator" aria-hidden="true"></div>
        <button id="toggleDock">—</button>

        <div id="miniMenu">
          <div id="widgetToggle">▲</div>
          <div id="widgetContainer">
            <button class="widgetBtn">🔫 Ataque Simple +10</button>
          </div>
        </div>

        <div id="dockContent">
          <h3>CONTROLES</h3>
          <p>Direccionales <br />← ↑ ↓ →</p>
          <p>W / Arriba</p>
          <p>S / Abajo</p>

          <hr />

          <h3>ENERGÍA</h3>
          <div class="fuel-bar">
            <div id="fuelLevel"></div>
          </div>
          <span id="fuelText">100%</span>

          <hr />

          <h3>MAPA</h3>
          <div id="miniMap"></div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
